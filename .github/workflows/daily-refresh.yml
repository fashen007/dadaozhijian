name: Daily refresh and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1 * * *" # 09:15 Asia/Shanghai

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect public updates
        env:
          XUEQIU_COOKIE: ${{ secrets.XUEQIU_COOKIE }}
          TRACKER_USER_AGENT: ${{ secrets.TRACKER_USER_AGENT }}
        run: python3 collect.py
      - name: Keep the daily archive in git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feed.json
          git diff --cached --quiet || git commit -m "Update public activity feed"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
